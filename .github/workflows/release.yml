name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: 10.0.x
  PROJECT_PATH: OsuInstaFadeSkinGenerator.csproj

jobs:
  prepare:
    name: Validate release trigger
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.resolve_tag.outputs.should_release }}
      tag: ${{ steps.resolve_tag.outputs.tag }}
      prerelease: ${{ steps.resolve_tag.outputs.prerelease }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          mapfile -t tags < <(git tag --points-at "${{ github.event.workflow_run.head_sha }}" \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$')

          if [ "${#tags[@]}" -eq 0 ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "No matching release tag found for this CI run. Expected vX.Y.Z or vX.Y.Z-rcN. Skipping release workflow."
            exit 0
          fi

          if [ "${#tags[@]}" -gt 1 ]; then
            echo "::error::Expected exactly one release tag for commit ${{ github.event.workflow_run.head_sha }}, found ${#tags[@]}: ${tags[*]}"
            exit 1
          fi

          tag="${tags[0]}"
          prerelease=false
          if [[ "$tag" =~ -rc[0-9]+$ ]]; then
            prerelease=true
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $tag"

  publish:
    name: Publish ${{ matrix.runtime }}
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: windows-latest
            runtime: win-arm64
          - os: ubuntu-latest
            runtime: linux-x64
          - os: ubuntu-latest
            runtime: linux-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }} --runtime ${{ matrix.runtime }}

      - name: Publish app
        run: >-
          dotnet publish ${{ env.PROJECT_PATH }}
          --configuration Release
          --runtime ${{ matrix.runtime }}
          --self-contained true
          --output artifacts/${{ matrix.runtime }}
          --no-restore

      - name: Archive publish output
        shell: pwsh
        run: |
          $archivePath = "artifacts/osu-insta-fade-skin-generator-${{ matrix.runtime }}.zip"
          Compress-Archive -Path "artifacts/${{ matrix.runtime }}/*" -DestinationPath $archivePath -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: osu-insta-fade-skin-generator-${{ matrix.runtime }}
          path: artifacts/osu-insta-fade-skin-generator-${{ matrix.runtime }}.zip
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs:
      - prepare
      - publish
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download published artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: release-artifacts/**/*.zip
