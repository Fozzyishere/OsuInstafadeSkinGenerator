name: Release

on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name || github.ref_name || github.run_id }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 10.0.x
  PROJECT_PATH: OsuInstaFadeSkinGenerator.csproj

jobs:
  prepare:
    name: Resolve release context
    if: github.event_name == 'push' || github.event_name == 'release'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      tag: ${{ steps.resolve.outputs.tag }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}
      should_publish: ${{ steps.resolve.outputs.should_publish }}
      generate_release_notes: ${{ steps.resolve.outputs.generate_release_notes }}

    steps:
      - name: Resolve tag, dedupe state, and notes policy
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          semver_regex='^v[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$'

          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${{ github.ref_name }}"
          else
            tag="${{ github.event.release.tag_name }}"
          fi

          if [[ ! "$tag" =~ $semver_regex ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "source_ref=" >> "$GITHUB_OUTPUT"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "generate_release_notes=false" >> "$GITHUB_OUTPUT"
            echo "Tag '$tag' does not match vX.Y.Z or vX.Y.Z-rcN. Skipping release workflow."
            exit 0
          fi

          prerelease=false
          if [[ "$tag" =~ -rc[0-9]+$ ]]; then
            prerelease=true
          fi

          if [ "${{ github.event_name }}" = "release" ] && [ "${{ github.event.release.prerelease }}" = "true" ]; then
            prerelease=true
          fi

          release_json="$(gh api "repos/${{ github.repository }}/releases/tags/$tag" 2>/dev/null || true)"

          release_exists=false
          has_release_notes=false
          assets_complete=false

          if [ -n "$release_json" ]; then
            release_exists=true

            body_text="$(jq -r '.body // ""' <<< "$release_json")"
            if [ -n "$(printf '%s' "$body_text" | tr -d '[:space:]')" ]; then
              has_release_notes=true
            fi

            expected_assets=(
              "osu-insta-fade-skin-generator-win-x64.zip"
              "osu-insta-fade-skin-generator-win-arm64.zip"
              "osu-insta-fade-skin-generator-linux-x64.zip"
              "osu-insta-fade-skin-generator-linux-arm64.zip"
            )

            assets_complete=true
            for asset_name in "${expected_assets[@]}"; do
              if ! jq -e --arg name "$asset_name" '.assets[]? | select(.name == $name)' <<< "$release_json" > /dev/null; then
                assets_complete=false
                break
              fi
            done
          fi

          should_publish=true
          if [ "$assets_complete" = "true" ]; then
            should_publish=false
          fi

          generate_release_notes=true
          if [ "$has_release_notes" = "true" ]; then
            generate_release_notes=false
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "source_ref=refs/tags/$tag" >> "$GITHUB_OUTPUT"
          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"
          echo "generate_release_notes=$generate_release_notes" >> "$GITHUB_OUTPUT"

          echo "Resolved release tag: $tag"
          echo "Release exists: $release_exists"
          echo "Assets complete: $assets_complete"
          echo "Should publish binaries: $should_publish"
          echo "Generate release notes: $generate_release_notes"

  publish:
    name: Build and publish ${{ matrix.runtime }}
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true' && needs.prepare.outputs.should_publish == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: windows-latest
            runtime: win-arm64
          - os: ubuntu-latest
            runtime: linux-x64
          - os: ubuntu-latest
            runtime: linux-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.source_ref }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }} --runtime ${{ matrix.runtime }}

      # Single publish step (no --no-build): split build+publish can emit a
      # framework-dependent apphost when build omits --self-contained, and
      # PublishSingleFile + --no-build has had SDK regressions (dotnet/sdk#44992).
      - name: Publish app
        run: >-
          dotnet publish ${{ env.PROJECT_PATH }}
          --configuration Release
          --runtime ${{ matrix.runtime }}
          --self-contained true
          --output artifacts/${{ matrix.runtime }}
          --no-restore

      - name: Verify self-contained executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem "artifacts/${{ matrix.runtime }}" -Filter "*.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $exe) {
            $dll = Get-ChildItem "artifacts/${{ matrix.runtime }}" -Filter "*.dll" | Select-Object -First 1
            if (-not $dll) { throw "No published binary found in artifacts/${{ matrix.runtime }}" }
            Write-Host "Non-Windows RID: skipping apphost self-contained probe."
            exit 0
          }
          $text = [System.Text.Encoding]::ASCII.GetString([IO.File]::ReadAllBytes($exe.FullName))
          if ($text -match '"framework"\s*:\s*\{') {
            throw "Published $($exe.Name) is framework-dependent (expects a shared .NET runtime). Check SelfContained and publish steps."
          }
          if ($text -notmatch 'includedFrameworks') {
            throw "Published $($exe.Name) does not embed includedFrameworks; self-contained publish likely failed."
          }
          Write-Host "Verified $($exe.Name) is self-contained."

      - name: Archive publish output
        shell: pwsh
        run: |
          $archivePath = "artifacts/osu-insta-fade-skin-generator-${{ matrix.runtime }}.zip"
          Compress-Archive -Path "artifacts/${{ matrix.runtime }}/*" -DestinationPath $archivePath -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: osu-insta-fade-skin-generator-${{ matrix.runtime }}
          path: artifacts/osu-insta-fade-skin-generator-${{ matrix.runtime }}.zip
          if-no-files-found: error

  release_with_artifacts:
    name: Create or update release
    needs:
      - prepare
      - publish
    if: needs.prepare.outputs.should_release == 'true' && needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download published artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          append_body: false
          generate_release_notes: ${{ needs.prepare.outputs.generate_release_notes == 'true' }}
          files: release-artifacts/**/*.zip

  release_notes_only:
    name: Generate missing release notes
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true' && needs.prepare.outputs.should_publish != 'true' && needs.prepare.outputs.generate_release_notes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate release notes for existing release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          append_body: false
          generate_release_notes: true
