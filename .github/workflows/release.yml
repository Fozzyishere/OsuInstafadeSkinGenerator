name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  PROJECT_PATH: OsuInstaFadeSkinGenerator.csproj

jobs:
  publish:
    name: Publish ${{ matrix.runtime }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runtime: win-x86
          - os: windows-latest
            runtime: win-x64
          - os: windows-latest
            runtime: win-arm64
          - os: ubuntu-latest
            runtime: linux-x64
          - os: ubuntu-latest
            runtime: linux-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }} --runtime ${{ matrix.runtime }}

      - name: Publish app
        run: >-
          dotnet publish ${{ env.PROJECT_PATH }}
          --configuration Release
          --runtime ${{ matrix.runtime }}
          --self-contained true
          --output artifacts/${{ matrix.runtime }}
          --no-restore

      - name: Archive publish output
        shell: pwsh
        run: |
          $archivePath = "artifacts/osu-insta-fade-skin-generator-${{ matrix.runtime }}.zip"
          Compress-Archive -Path "artifacts/${{ matrix.runtime }}/*" -DestinationPath $archivePath -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: osu-insta-fade-skin-generator-${{ matrix.runtime }}
          path: artifacts/osu-insta-fade-skin-generator-${{ matrix.runtime }}.zip
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download published artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/**/*.zip